# Auto-versioning: every merge to main computes the next semver from
# conventional commit titles (feat → minor, fix → patch, BREAKING CHANGE /
# ! → major), pushes the tag, and publishes a GitHub Release with notes.
#
# PR titles become the squash commit, so writing "feat: ..." on the PR is
# all it takes — no manual version bookkeeping.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the bump is computed from commits since the last tag

      - name: Compute next version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Publish GitHub Release
        if: steps.tag.outputs.new_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.new_tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.tag.outputs.new_tag }}" \
            --generate-notes
